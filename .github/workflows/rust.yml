# Synapse Core CI/CD Workflow
#
# This workflow runs on every push to `main`/`develop` and on pull requests
# targeting `develop`. It is split into three jobs that run in sequence:
#
#   unit-tests ──┐
#                ├──► coverage
#   integration-tests ──┘
#
# ## Pagination in CI/CD
#
# Pagination logic (cursor-based, offset-based, and WebSocket streaming) is
# exercised across all three jobs:
#
# - unit-tests:       runs `--lib --bins` which includes all inline `#[cfg(test)]`
#                     modules, covering pure-logic pagination unit tests
#                     (cursor encoding/decoding, limit clamping, filter building).
#
# - integration-tests: runs `-- --ignored` which includes the full integration
#                      test suite. Pagination integration tests are gated with
#                      `#[ignore]` because they require live Postgres + Redis.
#                      The `--skip` flags exclude unrelated flaky tests so that
#                      pagination tests always run.
#
# - coverage:         collects LLVM coverage across both unit and integration
#                     test runs and enforces a minimum line-coverage threshold.
#                     Pagination code paths (cursor queries, offset queries,
#                     GraphQL pagination resolvers) must remain above the
#                     project-wide 40 % floor; the 60 % warning threshold
#                     encourages higher coverage over time.
#
# See docs/ci-cd-pagination.md for a full explanation of how pagination tests
# are structured, what each job covers, and how to add new pagination tests.

name: Rust

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "develop" ]

# Cancel any in-progress run for the same branch/PR so stale sessions never
# block fresh commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_CACHE_SIZE: 1G
  # Regex used by cargo-llvm-cov to exclude generated/test files from coverage
  # reports. Pagination test helpers in tests/ are excluded here so that only
  # production pagination code (src/) counts toward the threshold.
  COVERAGE_IGNORE_REGEX: '(^|.*/)(tests?/.*|generated/.*|\.sqlx/.*)$'
  # CI pool sizing: keep connections low to match the single-node test DB.
  # These are picked up by Config::load() via DB_MIN_CONNECTIONS / DB_MAX_CONNECTIONS.
  DB_MIN_CONNECTIONS: "2"
  DB_MAX_CONNECTIONS: "10"
  DB_IDLE_TIMEOUT_SECS: "30"
  DB_STATEMENT_TIMEOUT_MS: "30000"
  DB_LONG_RUNNING_STATEMENT_TIMEOUT_MS: "120000"

jobs:
  # ── Job 1: unit-tests ────────────────────────────────────────────────────────
  # Runs fast, stateless tests that do not require Redis.
  # Covers:
  #   - Cursor encoding / decoding (src/utils/cursor.rs)
  #   - Limit clamping and filter building (src/db/query_builder.rs)
  #   - GraphQL pagination types (src/graphql/pagination/)
  #   - Quota middleware logic (src/middleware/quota.rs)
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        rust: [stable]

    # Serialize external API calls (taiki-e install-action) to avoid GitHub API rate limits
    # Multiple concurrent requests from install-action would quickly exhaust the rate limit
    concurrency:
      group: ${{ github.workflow }}-install-tools-${{ github.ref }}
      cancel-in-progress: false

    # Limit job-level permissions to the minimum required.
    permissions:
      contents: read

    services:
      # Postgres is required even for unit tests because sqlx performs
      # compile-time query verification against a live database.
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy

    - name: Install sccache
      uses: taiki-e/install-action@sccache

    # Restore the sccache daemon session between runs so the compiler-cache
    # hit rate is maximised without leaking state across unrelated branches.
    - name: Start sccache session
      run: sccache --start-server || true

    - name: Cache Cargo registry and build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-${{ matrix.rust }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.rust }}-cargo-
          ${{ runner.os }}-cargo-

    - name: Check formatting
      if: matrix.rust == 'stable'
      run: cargo fmt --all -- --check

    - name: Install sqlx-cli
      uses: taiki-e/install-action@v2
      with:
        tool: sqlx-cli@0.7.4

    # Validates that no migration breaks existing pagination indexes.
    # The script checks for destructive operations (DROP INDEX, ALTER TABLE)
    # on columns used by cursor queries (created_at, id).
    - name: Check migration safety
      if: matrix.rust == 'stable'
      run: ./scripts/check-migration-safety.sh migrations

    - name: Run migrations
      id: run_migrations
      run: |
        for i in 1 2 3; do
          sqlx migrate run && break
          echo "Migration attempt $i/3 failed, retrying in 5 seconds..."
          sleep 5
          [ "$i" -eq 3 ] && { echo "All migration attempts failed"; exit 1; }
        done
      env:
        DATABASE_URL: postgres://synapse:synapse@localhost:5432/synapse_test
      continue-on-error: false

    - name: Handle migration failure
      if: failure() && steps.run_migrations.outcome == 'failure'
      run: |
        echo "::error::Database migration failed. Please review migration files and database state."
        echo "::error::Check logs above for specific migration errors."
        exit 1

    - name: Run clippy
      id: run_clippy
      if: matrix.rust == 'stable'
      run: |
        set -e
        echo "Running clippy linter..."
        if ! cargo clippy -- -D warnings; then
          echo "::error::Clippy found issues. Please fix linting errors."
          exit 1
        fi
        echo "Clippy checks passed"
      env:
        DATABASE_URL: postgres://synapse:synapse@localhost:5432/synapse_test
      continue-on-error: false

    - name: Handle clippy failure
      if: failure() && steps.run_clippy.outcome == 'failure'
      run: |
        echo "::error::Clippy linting failed. Run 'cargo clippy -- -D warnings' locally to see issues."
        exit 1

    - name: Build
      id: build_project
      run: |
        set -e
        echo "Building project..."
        if ! cargo build --verbose; then
          echo "::error::Build failed. Check compilation errors above."
          exit 1
        fi
        echo "Build completed successfully"
      env:
        DATABASE_URL: postgres://synapse:synapse@localhost:5432/synapse_test
      continue-on-error: false

    - name: Handle build failure
      if: failure() && steps.build_project.outcome == 'failure'
      run: |
        echo "::error::Project build failed. Review compilation errors and fix syntax/type issues."
        exit 1

    # Runs all inline unit tests (`#[cfg(test)]` modules inside src/).
    # Pagination unit tests covered here:
    #   - src/utils/cursor.rs        — cursor encode/decode round-trips
    #   - src/db/query_builder.rs    — dynamic WHERE clause construction
    #   - src/graphql/pagination/    — cursor and offset pagination types
    #   - src/middleware/quota.rs    — rate-limit logic (affects paginated endpoints)
    - name: Run unit tests
      id: run_unit_tests
      run: |
        set -e
        echo "Running unit tests..."
        if ! cargo test --lib --bins --verbose; then
          echo "::error::Unit tests failed. Check test output above for failures."
          exit 1
        fi
        echo "Unit tests passed"
      env:
        DATABASE_URL: postgres://synapse:synapse@localhost:5432/synapse_test
      continue-on-error: false

    - name: Handle unit test failure
      if: failure() && steps.run_unit_tests.outcome == 'failure'
      run: |
        echo "::error::Unit tests failed. Run 'cargo test --lib --bins' locally to debug."
        exit 1


  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        rust: [stable]

    # Serialize external API calls (taiki-e install-action) to avoid GitHub API rate limits
    # This concurrency group ensures install-action calls are not made concurrently across jobs
    concurrency:
      group: ${{ github.workflow }}-install-tools-${{ github.ref }}
      cancel-in-progress: false

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 5s
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ matrix.rust }}

    - name: Install sccache
      uses: taiki-e/install-action@sccache

    - name: Start sccache session
      run: sccache --start-server || true

    - name: Cache Cargo registry and build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-${{ matrix.rust }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.rust }}-cargo-
          ${{ runner.os }}-cargo-

    - name: Install sqlx-cli
      uses: taiki-e/install-action@v2
      with:
        tool: sqlx-cli@0.7.4

    - name: Run migrations
      run: |
        for i in 1 2 3; do
          sqlx migrate run && break
          echo "Migration attempt $i/3 failed, retrying in 5 seconds..."
          sleep 5
          [ "$i" -eq 3 ] && { echo "All migration attempts failed"; exit 1; }
        done
      env:
        DATABASE_URL: postgres://synapse:synapse@localhost:5432/synapse_test

    # Runs all tests marked `#[ignore]` — these are the integration tests that
    # require live services.
    #
    # Pagination tests included:
    #   tests/integration_test.rs   — cursor pagination, empty pages, last page
    #   tests/search_test.rs        — paginated full-text search results
    #   tests/websocket_test.rs     — paginated history on WS connect
    #   tests/graphql_test.rs       — GraphQL cursor + offset pagination
    #   tests/export_test.rs        — streaming export (large paginated result)
    #
    # Skipped tests:
    #   test_api_versioning_headers — unrelated to pagination; flaky in CI
    #   test_invalid_signature_flow — auth test; no pagination dependency
    - name: Run integration tests
      id: run_integration_tests
      run: |
        set -e
        echo "Running integration tests..."
        if ! cargo test --verbose -- --ignored --skip test_api_versioning_headers --skip test_invalid_signature_flow; then
          echo "::error::Integration tests failed. Check test output for failures."
          exit 1
        fi
        echo "Integration tests passed"
      env:
        DATABASE_URL: postgres://synapse:synapse@localhost:5432/synapse_test
        REDIS_URL: redis://localhost:6379
      continue-on-error: false

    - name: Handle integration test failure
      if: failure() && steps.run_integration_tests.outcome == 'failure'
      run: |
        echo "::error::Integration tests failed. Ensure services (postgres, redis) are running."
        echo "::error::Run 'cargo test -- --ignored' locally to debug."
        exit 1


  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - unit-tests
      - integration-tests
    # Serialize external API calls (codecov, taiki-e install-action) to reduce rate limit pressure
    # Coverage job makes multiple external API requests; running sequentially prevents rate limit errors
    concurrency:
      group: ${{ github.workflow }}-external-api-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 5s
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: stable
        components: llvm-tools-preview

    - name: Install sccache
      uses: taiki-e/install-action@sccache

    - name: Start sccache session
      run: sccache --start-server || true

    - name: Cache Cargo registry and build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-coverage-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-coverage-cargo-
          ${{ runner.os }}-cargo-

    - name: Install sqlx-cli
      uses: taiki-e/install-action@v2
      with:
        tool: sqlx-cli@0.7.4

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Run migrations
      run: |
        for i in 1 2 3; do
          sqlx migrate run && break
          echo "Migration attempt $i/3 failed, retrying in 5 seconds..."
          sleep 5
          [ "$i" -eq 3 ] && { echo "All migration attempts failed"; exit 1; }
        done
      env:
        DATABASE_URL: postgres://synapse:synapse@localhost:5432/synapse_test

    # Two-pass coverage collection:
    #   Pass 1 (--lib --bins): unit tests — fast, no Redis needed.
    #   Pass 2 (--ignored):    integration tests — requires Postgres + Redis.
    #
    # Both passes contribute to the same coverage report so that pagination
    # code exercised only by integration tests (e.g. the actual SQL queries)
    # is still counted.
    #
    # The COVERAGE_IGNORE_REGEX excludes test helpers and generated files so
    # that only production pagination code affects the threshold.
    - name: Collect coverage data
      id: collect_coverage
      run: |
        set -e
        echo "Collecting code coverage data..."
        
        if ! cargo llvm-cov clean --workspace; then
          echo "::error::Failed to clean coverage data"
          exit 1
        fi
        
        if ! cargo llvm-cov --workspace --lib --bins --no-report; then
          echo "::error::Failed to collect unit test coverage"
          exit 1
        fi
        
        if ! cargo llvm-cov --workspace --no-report -- --ignored --skip test_api_versioning_headers --skip test_invalid_signature_flow; then
          echo "::error::Failed to collect integration test coverage"
          exit 1
        fi
        
        if ! cargo llvm-cov report --html --output-dir target/llvm-cov/html --ignore-filename-regex "$COVERAGE_IGNORE_REGEX"; then
          echo "::error::Failed to generate HTML coverage report"
          exit 1
        fi
        
        if ! cargo llvm-cov report --lcov --output-path target/llvm-cov/lcov.info --ignore-filename-regex "$COVERAGE_IGNORE_REGEX"; then
          echo "::error::Failed to generate LCOV coverage report"
          exit 1
        fi
        
        if ! cargo llvm-cov report --json --summary-only --output-path target/llvm-cov/summary.json --ignore-filename-regex "$COVERAGE_IGNORE_REGEX"; then
          echo "::error::Failed to generate JSON coverage summary"
          exit 1
        fi
        
        echo "Coverage data collection completed successfully"
      env:
        DATABASE_URL: postgres://synapse:synapse@localhost:5432/synapse_test
        REDIS_URL: redis://localhost:6379
      continue-on-error: false

    - name: Handle coverage collection failure
      if: failure() && steps.collect_coverage.outcome == 'failure'
      run: |
        echo "::error::Coverage collection failed. Check cargo-llvm-cov installation and test execution."
        exit 1

    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          target/llvm-cov/html/
          target/llvm-cov/lcov.info
          target/llvm-cov/summary.json
        if-no-files-found: error

    # Serialize external API upload (Codecov) to avoid overwhelming their rate limits
    # Multiple workflows uploading simultaneously would increase 429 error probability
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
        files: target/llvm-cov/lcov.info
        flags: rust
        name: rust-coverage
        disable_search: true
        verbose: true

    # Enforces coverage thresholds using the JSON summary produced above.
    # jq extracts the line-coverage percentage; awk compares it to the limits.
    # Adding new pagination code without tests will cause this step to fail
    # if coverage drops below 40 %.
    - name: Enforce coverage thresholds
      id: enforce_coverage
      run: |
        set -e
        echo "Checking coverage thresholds..."
        
        if [ ! -f target/llvm-cov/summary.json ]; then
          echo "::error::Coverage summary file not found"
          exit 1
        fi
        
        coverage=$(jq -r '.data[0].totals.lines.percent' target/llvm-cov/summary.json)
        
        if [ -z "$coverage" ] || [ "$coverage" = "null" ]; then
          echo "::error::Failed to parse coverage percentage from summary"
          exit 1
        fi
        
        echo "Line coverage: ${coverage}%"

        if awk -v c="$coverage" 'BEGIN { exit !(c < 40) }'; then
          echo "::error::Coverage ${coverage}% is below the required minimum of 40%."
          exit 1
        fi

        if awk -v c="$coverage" 'BEGIN { exit !(c < 60) }'; then
          echo "::warning::Coverage ${coverage}% is below the warning threshold of 60%."
        fi
        
        echo "Coverage threshold check passed"
      continue-on-error: false

    - name: Handle coverage threshold failure
      if: failure() && steps.enforce_coverage.outcome == 'failure'
      run: |
        echo "::error::Coverage threshold enforcement failed. Increase test coverage to meet minimum requirements."
        exit 1
